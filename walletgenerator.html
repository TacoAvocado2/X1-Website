<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>X1Coin Paper Wallet Generator</title><style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #ffffff;
        color: #000000;
        text-align: center;
    }

    h1 {
        margin: 0;
        color: #000000;
        letter-spacing: 2px;
        padding: 20px;
        border-bottom: 2px solid #000;
    }

    button {
        background: #000000;
        border: none;
        padding: 15px 25px;
        margin: 20px;
        font-size: 16px;
        cursor: pointer;
        border-radius: 10px;
        color: #ffffff;
        font-weight: bold;
    }

    .wallet {
        margin-top: 20px;
        padding: 20px;
        border-top: 1px solid #ddd;
    }

    .box {
        background: #f5f5f5;
        margin: 10px auto;
        padding: 15px;
        width: 90%;
        max-width: 600px;
        border-radius: 10px;
        border: 1px solid #ccc;
        word-break: break-all;
    }

    img, canvas {
        margin-top: 10px;
        width: 200px;
        height: 200px;
        background: #fff;
        padding: 10px;
        border-radius: 10px;
        border: 1px solid #ccc;
    }

    .warning {
        color: #b00000;
        font-size: 12px;
        margin-top: 20px;
    }
</style></head>
<body><h1>X1COIN PAPER WALLET</h1><button onclick="generateWallet()">Generate New Wallet</button>

<div class="wallet" id="wallet"></div><div class="warning">
    ⚠️ IMPORTANT: Run offline only. Do not use on hosted servers.
</div><script src="https://cdn.jsdelivr.net/npm/bitcoinjs-lib@6.1.5/dist/bitcoinjs-lib.min.js"></script><script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script><script>
function generateWallet() {
    const walletDiv = document.getElementById('wallet');
    walletDiv.innerHTML = "Generating...";

    const keyPair = bitcoinjsLib.ECPair.makeRandom();
    const privateKey = keyPair.toWIF();
    const { address } = bitcoinjsLib.payments.p2pkh({
        pubkey: keyPair.publicKey
    });

    walletDiv.innerHTML = `
        <div class="box">
            <h3>X1COIN ADDRESS</h3>
            <p>${address}</p>
            <canvas id="addrQR"></canvas>
        </div>

        <div class="box">
            <h3>PRIVATE KEY (KEEP SECRET)</h3>
            <p>${privateKey}</p>
            <canvas id="keyQR"></canvas>
        </div>
    `;

    QRCode.toCanvas(document.getElementById('addrQR'), address);
    QRCode.toCanvas(document.getElementById('keyQR'), privateKey);
}
</script></body>
</html>
