<svg width="140" height="140" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">

  <!-- Outer coin ring -->
  <circle cx="70" cy="70" r="62" stroke="#000" stroke-width="5" fill="none"></circle>

  <!-- Inner ring (subtle depth) -->
  <circle cx="70" cy="70" r="48" stroke="#000" stroke-width="1.5" fill="none" opacity="0.2"></circle>

  <!-- X (balanced + strong) -->
  <line x1="42" y1="42" x2="98" y2="98" stroke="#000" stroke-width="10" stroke-linecap="round"></line>
  <line x1="98" y1="42" x2="42" y2="98" stroke="#000" stroke-width="10" stroke-linecap="round"></line>

  <!-- Embedded "1" (negative space) -->
  <rect x="67" y="30" width="6" height="80" fill="#fff"></rect>

</svg>